<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Святослав Князев</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Навигация -->
    <nav class="navigation">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">👨‍</span>
                <span class="logo-text">Portfolio</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Главная</a></li>
                <li><a href="contacts.html" class="nav-link active">Контакты</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero секция -->
    <header class="hero contacts-hero">
        <div class="container hero-content">
            <div class="hero-text">
                <h1 class="hero-title">
                    Давайте <span class="gradient-text">общаться</span>
                </h1>
                <p class="hero-subtitle">Я всегда открыт для новых предложений</p>
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="container section">
        <div class="contacts-wrapper">
            <!-- Контактная информация -->
            <section class="contact-info">
                <h2 class="section-title">📬 Контакты</h2>
                
                <div class="contact-cards">
                    <div class="contact-card">
                        <div class="contact-icon-wrapper">
                            <span class="contact-icon">📧</span>
                        </div>
                        <div class="contact-details">
                            <h3>Email</h3>
                            <p>alexander.petrov@email.com</p>
                        </div>
                    </div>

                    <div class="contact-card">
                        <div class="contact-icon-wrapper">
                            <span class="contact-icon">📱</span>
                        </div>
                        <div class="contact-details">
                            <h3>Телефон</h3>
                            <p>+7 (999) 123-45-67</p>
                        </div>
                    </div>

                    <div class="contact-card">
                        <div class="contact-icon-wrapper">
                            <span class="contact-icon">📍</span>
                        </div>
                        <div class="contact-details">
                            <h3>Адрес</h3>
                            <p>г. Санкт-Петербург, Россия</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Форма обратной связи -->
            <section class="contact-form-section">
                <h2 class="section-title">✉️ Форма связи</h2>
                
                <form id="feedbackForm" class="feedback-form">
                    <div class="form-group">
                        <label for="name" class="form-label">Ваше имя *</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            class="form-input" 
                            placeholder="Иван Иванов"
                        >
                        <span class="error-message" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email *</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input" 
                            placeholder="example@email.com"
                        >
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="comment" class="form-label">Комментарий *</label>
                        <textarea 
                            id="comment" 
                            name="comment" 
                            class="form-textarea" 
                            rows="6"
                            placeholder="Ваше сообщение..."
                        ></textarea>
                        <span class="error-message" id="commentError"></span>
                    </div>

                    <button type="submit" class="submit-btn">
                        <span>Отправить</span>
                        <span class="btn-icon">🚀</span>
                    </button>
                </form>
                
                <div id="formResult"></div>
            </section>
        </div>
    </main>

    <!-- Футер -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Александр Петров. Все права защищены.</p>
        </div>
    </footer>

    <!-- Подключение JavaScript -->
    <script src="script.js"></script>
</body>
</html>
